<!DOCTYPE html>
<html lang="fr" data-i18n-lang="current">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulegal - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/auth.js"></script>
    <script src="/static/i18n.js"></script>
</head>

<body>
    <div class="container auth-container">
        <header>
            <a href="/app" style="text-decoration: none;">
                <h1 class="logo">Simulegal</h1>
            </a>
            <p class="tagline" data-i18n="auth_tagline">Espace Personnel & Administration</p>
        </header>

        <div class="card auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')" data-i18n="tab_login">Connexion</button>
                <button class="auth-tab" onclick="switchTab('register')" data-i18n="tab_register">Inscription</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="lbl_email">Email</label>
                    <input type="email" id="login-email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="lbl_password">Mot de passe</label>
                    <input type="password" id="login-password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_login">Se connecter</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="lbl_fullname">Nom complet</label>
                    <input type="text" id="reg-name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="lbl_email">Email</label>
                    <input type="email" id="reg-email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="lbl_password">Mot de passe</label>
                    <input type="password" id="reg-password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_register">S'inscrire</button>
            </form>

            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <script>
        // Si déjà connecté, redirection
        if (Auth.isAuthenticated()) {
            window.location.href = '/app';
        }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
            }
            document.getElementById('error-message').textContent = '';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            try {
                await Auth.login(email, pass);
                const user = Auth.getUser();
                if (user.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/app';
                }
            } catch (err) {
                showError(err.message);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;

            try {
                await Auth.register(email, pass, name);
                window.location.href = '/app';
            } catch (err) {
                showError(err.message);
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>

</html>
