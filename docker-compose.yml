version: '3.8'

services:
  db:
    image: postgres:15
    container_name: simulegal_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-simulegal}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: simulegal_app
    restart: always
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-simulegal}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_mock}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      - db

volumes:
  postgres_data:
